<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F2A44">
  <link rel="apple-touch-icon" href="/icons/ios/180.png">

  <title>Login | Mentora Edge</title>

  <link rel="icon" href="favicon.ico">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',

      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif']
          },

          colors: {
            primary: '#0F2A44',
            accent: '#22C55E',
            accentSoft: '#4ADE80'
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen bg-[#F8FAFC] dark:bg-[#07162B] font-inter overflow-x-hidden transition-colors duration-500">

<!-- BACKGROUND GLOW -->
<div class="absolute w-96 h-96 bg-green-400/20 blur-3xl rounded-full top-[-80px] left-[-80px] pointer-events-none"></div>

<div class="absolute w-96 h-96 bg-blue-500/20 blur-3xl rounded-full bottom-[-80px] right-[-80px] pointer-events-none"></div>

<!-- ================= CONTAINER ================= -->
<div class="min-h-screen flex items-center justify-center px-4 relative z-10">

  <div class="bg-white/70 dark:bg-white/5 backdrop-blur-xl p-8 rounded-3xl shadow-2xl w-full max-w-md
              border border-white/30 dark:border-white/10 animate-fadeIn transition-all duration-500">

    <!-- ================= HEADER ================= -->
    <div class="mb-8 text-center">

      <img
        src="Assets/Images/mentora-edge-logo.png"
        alt="Mentora Edge"
        class="h-12 mx-auto mb-4 transition-transform duration-300 hover:scale-110"
      />

      <h2 class="text-2xl font-extrabold text-primary dark:text-white">
        Admin / Student Login
      </h2>

      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
        Mentora Edge · Unified Login Portal
      </p>

    </div>

    <!-- ================= FORM ================= -->
    <form id="loginForm" class="space-y-4">

      <input
        type="email"
        id="email"
        placeholder="Email address"
        required
        class="input"
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
        class="input"
      />

      <!-- Forgot Password -->
      <p class="text-sm text-right">

        <button
          type="button"
          id="forgotPasswordBtn"
          class="text-accent font-medium hover:underline">

          Forgot password?

        </button>

      </p>

      <!-- LOGIN BUTTON -->
      <button
        type="submit"
        id="loginBtn"
        class="w-full flex items-center justify-center gap-2
               bg-gradient-to-r from-green-500 to-green-600
               text-white py-3 rounded-xl font-semibold
               shadow-lg hover:scale-[1.02]
               hover:shadow-xl active:scale-[0.98]
               transition-all duration-300 glow-hover"
      >

        <span id="btnText">Login</span>

        <!-- Spinner -->
        <svg
          id="spinner"
          class="hidden w-5 h-5 animate-spin text-white"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24">

          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4">
          </circle>

          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z">
          </path>

        </svg>

      </button>

      <!-- BIOMETRIC LOGIN -->
      <button
        type="button"
        id="biometricLoginBtn"
        class="w-full flex items-center justify-center gap-2
               bg-white/70 dark:bg-white/10
               border border-gray-200 dark:border-white/10
               text-primary dark:text-white
               py-3 rounded-xl font-semibold
               shadow-md hover:scale-[1.02]
               hover:shadow-lg transition-all duration-300"
      >

        🔐 Login with Biometrics

      </button>

      <p class="text-sm text-center text-gray-600 dark:text-gray-400">

        Don’t have an account?

        <a href="courses.html"
           class="text-accent font-semibold hover:underline">

          Register here

        </a>

      </p>

    </form>

    <!-- ERROR -->
    <div
      id="error"
      class="hidden mt-5 text-sm text-red-600 bg-red-50 border border-red-200
             rounded-xl px-4 py-3 text-center animate-scaleIn">
    </div>

  </div>
</div>

<!-- ================= SCRIPT ================= -->

  import {
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const form = document.getElementById("loginForm");
  const errorMsg = document.getElementById("error");

  const loginBtn = document.getElementById("loginBtn");
  const btnText = document.getElementById("btnText");
  const spinner = document.getElementById("spinner");

  const forgotBtn = document.getElementById("forgotPasswordBtn");

  // ================= NORMAL LOGIN =================
