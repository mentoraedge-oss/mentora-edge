<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F2A44">
  <link rel="apple-touch-icon" href="/icons/ios/180.png">

  <title>Login | Mentora Edge</title>
  <link rel="icon" href="favicon.ico">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] },
          colors: {
            primary: '#0F2A44',
            accent: '#22C55E',
            accentSoft: '#4ADE80'
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen bg-[#F8FAFC] font-inter overflow-x-hidden">

<!-- BACKGROUND GLOW -->
<div class="absolute w-96 h-96 bg-green-400/20 blur-3xl rounded-full top-[-80px] left-[-80px]"></div>
<div class="absolute w-96 h-96 bg-blue-500/20 blur-3xl rounded-full bottom-[-80px] right-[-80px]"></div>

<!-- ================= CONTAINER ================= -->
<div class="min-h-screen flex items-center justify-center px-4 relative z-10">

  <div class="bg-white/70 backdrop-blur-xl p-8 rounded-3xl shadow-2xl w-full max-w-md
              border border-white/30 animate-fadeIn">

    <!-- ================= HEADER ================= -->
    <div class="mb-8 text-center">
      <img
        src="Assets/Images/mentora-edge-logo.png"
        alt="Mentora Edge"
        class="h-12 mx-auto mb-4 transition-transform duration-300 hover:scale-110"
      />

      <h2 class="text-2xl font-extrabold text-primary">
        Admin / Student Login
      </h2>

      <p class="text-sm text-gray-500 mt-1">
        Mentora Edge · Unified Login Portal
      </p>
    </div>

    <!-- ================= FORM ================= -->
    <form id="loginForm" class="space-y-4">

      <input
        type="email"
        id="email"
        placeholder="Email address"
        required
        class="input"
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
        class="input"
      />

      <!-- Forgot Password -->
      <p class="text-sm text-right">
        <button
          type="button"
          id="forgotPasswordBtn"
          class="text-accent font-medium hover:underline">
          Forgot password?
        </button>
      </p>

      <!-- LOGIN BUTTON -->
      <button
        type="submit"
        id="loginBtn"
        class="w-full flex items-center justify-center gap-2
               bg-gradient-to-r from-green-500 to-green-600
               text-white py-3 rounded-xl font-semibold
               shadow-lg
               hover:scale-105 hover:shadow-xl
               active:scale-[0.98]
               transition-all duration-300"
      >
        <span id="btnText">Login</span>

        <!-- Spinner -->
        <svg
          id="spinner"
          class="hidden w-5 h-5 animate-spin text-white"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24">
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
        </svg>
      </button>

      <p class="text-sm text-center text-gray-600">
        Don’t have an account?
        <a href="courses.html" class="text-accent font-semibold hover:underline">
          Register here
        </a>
      </p>

    </form>

    <!-- ================= ERROR / INFO ================= -->
    <div
      id="error"
      class="hidden mt-5 text-sm text-red-600 bg-red-50 border border-red-200
             rounded-xl px-4 py-3 text-center animate-scaleIn">
    </div>

  </div>
</div>

<!-- ================= SCRIPT (UNCHANGED) ================= -->
<script type="module">
  import { auth, db } from "./js/firebase.js";
  import {
    signInWithEmailAndPassword,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc } from
    "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const form = document.getElementById("loginForm");
  const errorMsg = document.getElementById("error");
  const loginBtn = document.getElementById("loginBtn");
  const btnText = document.getElementById("btnText");
  const spinner = document.getElementById("spinner");
  const forgotBtn = document.getElementById("forgotPasswordBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    errorMsg.classList.add("hidden");
    loginBtn.disabled = true;
    btnText.textContent = "Logging in...";
    spinner.classList.remove("hidden");

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const userCredential = await signInWithEmailAndPassword(
        auth, email, password
      );

      const user = userCredential.user;
      const userDoc = await getDoc(doc(db, "users", user.uid));

      if (!userDoc.exists()) {
        throw new Error("User profile not found. Please contact admin.");
      }

      const userData = userDoc.data();

      if (userData.role === "admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "dashboard.html";
      }

    } catch (err) {
      loginBtn.disabled = false;
      btnText.textContent = "Login";
      spinner.classList.add("hidden");

      errorMsg.textContent =
        err.code === "auth/wrong-password"
          ? "Incorrect password. Please try again."
          : err.code === "auth/user-not-found"
          ? "No account found with this email."
          : err.message;

      errorMsg.classList.remove("hidden");
    }
  });

  forgotBtn.addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();

    if (!email) {
      errorMsg.textContent = "Please enter your registered email first.";
      errorMsg.classList.remove("hidden");
      return;
    }

    try {
      await sendPasswordResetEmail(auth, email);
      errorMsg.className =
        "mt-5 text-sm text-green-700 bg-green-50 border border-green-200 rounded-xl px-4 py-3 text-center";
      errorMsg.textContent =
        "Password reset link sent. Please check your email.";
      errorMsg.classList.remove("hidden");
    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.classList.remove("hidden");
    }
  });
</script>

<!-- ================= STYLES ================= -->
<style>
.input {
  width: 100%;
  padding: 0.8rem 1rem;
  border-radius: 0.8rem;
  border: 1px solid #E5E7EB;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(6px);
  transition: 0.3s;
}
.input:focus {
  outline: none;
  border-color: #22C55E;
  box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-fadeIn { animation: fadeIn 0.7s ease; }

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
.animate-scaleIn { animation: scaleIn 0.3s ease; }
</style>

<!-- FOOTER -->
<footer class="mt-16 bg-gray-100 border-t">
  <div class="max-w-7xl mx-auto px-6 py-6 text-center text-sm text-gray-600">
    © 2026 <strong>Mentora Edge</strong>. All rights reserved ·
    <a href="/terms.html" class="text-accent hover:underline">
      Terms & Conditions
    </a> ·
    <a href="privacy.html" class="text-accent hover:underline">
      Privacy Policy
    </a>
  </div>
</footer>

</body>
</html>
