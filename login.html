<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F2A44">
  <link rel="apple-touch-icon" href="/icons/ios/180.png">

  <title>Login | Mentora Edge</title>

  <link rel="icon" href="favicon.ico">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',

      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif']
          },

          colors: {
            primary: '#0F2A44',
            accent: '#22C55E',
            accentSoft: '#4ADE80'
          }
        }
      }
    }
  </script>

  <!-- AUTO THEME -->
  <script>
    const savedTheme = localStorage.getItem("theme");

    if (
      savedTheme === "dark" ||
      (!savedTheme &&
        window.matchMedia("(prefers-color-scheme: dark)").matches)
    ) {
      document.documentElement.classList.add("dark");
    }
  </script>

</head>

<body class="min-h-screen bg-[#F8FAFC] dark:bg-[#07162B] font-inter overflow-x-hidden transition-colors duration-500">

<!-- BACKGROUND GLOW -->
<div class="absolute w-96 h-96 bg-green-400/20 blur-3xl rounded-full top-[-80px] left-[-80px] pointer-events-none"></div>

<div class="absolute w-96 h-96 bg-blue-500/20 blur-3xl rounded-full bottom-[-80px] right-[-80px] pointer-events-none"></div>

<!-- ================= CONTAINER ================= -->
<div class="min-h-screen flex items-center justify-center px-4 relative z-10">

  <div class="bg-white/70 dark:bg-white/5 backdrop-blur-xl p-8 rounded-3xl shadow-2xl w-full max-w-md
              border border-white/30 dark:border-white/10 animate-fadeIn transition-all duration-500">

    <!-- HEADER -->
    <div class="mb-8 text-center">

      <img
        src="Assets/Images/mentora-edge-logo.png"
        alt="Mentora Edge"
        class="h-12 mx-auto mb-4 transition-transform duration-300 hover:scale-110"
      />

      <h2 class="text-2xl font-extrabold text-primary dark:text-white">
        Admin / Student Login
      </h2>

      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
        Mentora Edge · Unified Login Portal
      </p>

    </div>

    <!-- FORM -->
    <form id="loginForm" class="space-y-4">

      <input
        type="email"
        id="email"
        placeholder="Email address"
        required
        class="input"
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
        class="input"
      />

      <!-- Forgot Password -->
      <p class="text-sm text-right">

        <button
          type="button"
          id="forgotPasswordBtn"
          class="text-accent font-medium hover:underline">

          Forgot password?

        </button>

      </p>

      <!-- LOGIN BUTTON -->
      <button
        type="submit"
        id="loginBtn"
        class="w-full flex items-center justify-center gap-2
               bg-gradient-to-r from-green-500 to-green-600
               text-white py-3 rounded-xl font-semibold
               shadow-lg hover:scale-[1.02]
               hover:shadow-xl active:scale-[0.98]
               transition-all duration-300 glow-hover"
      >

        <span id="btnText">Login</span>

        <!-- Spinner -->
        <svg
          id="spinner"
          class="hidden w-5 h-5 animate-spin text-white"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24">

          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4">
          </circle>

          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z">
          </path>

        </svg>

      </button>

      <!-- BIOMETRIC LOGIN -->
      <button
        type="button"
        id="biometricLoginBtn"
        class="w-full flex items-center justify-center gap-2
               bg-white/70 dark:bg-white/10
               border border-gray-200 dark:border-white/10
               text-primary dark:text-white
               py-3 rounded-xl font-semibold
               shadow-md hover:scale-[1.02]
               hover:shadow-lg transition-all duration-300"
      >

        🔐 Login with Biometrics

      </button>

      <p class="text-sm text-center text-gray-600 dark:text-gray-400">

        Don’t have an account?

        <a href="courses.html"
           class="text-accent font-semibold hover:underline">

          Register here

        </a>

      </p>

    </form>

    <!-- ERROR -->
    <div
      id="error"
      class="hidden mt-5 text-sm text-red-600 bg-red-50 border border-red-200
             rounded-xl px-4 py-3 text-center animate-scaleIn">
    </div>

  </div>
</div>

<!-- ================= SCRIPT ================= -->
<script type="module">

  import { auth, db } from "./js/firebase.js";

  import {
    signInWithEmailAndPassword,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  import {
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const form = document.getElementById("loginForm");

  const errorMsg = document.getElementById("error");

  const loginBtn = document.getElementById("loginBtn");

  const btnText = document.getElementById("btnText");

  const spinner = document.getElementById("spinner");

  const forgotBtn = document.getElementById("forgotPasswordBtn");

  const biometricBtn = document.getElementById("biometricLoginBtn");

  // ================= NORMAL LOGIN =================

  form.addEventListener("submit", async (e) => {

    e.preventDefault();

    errorMsg.classList.add("hidden");

    loginBtn.disabled = true;

    btnText.textContent = "Logging in...";

    spinner.classList.remove("hidden");

    const email =
      document.getElementById("email").value.trim();

    const password =
      document.getElementById("password").value;

    try {

      const userCredential =
        await signInWithEmailAndPassword(
          auth,
          email,
          password
        );

      const user = userCredential.user;

      const userDoc =
        await getDoc(doc(db, "users", user.uid));

      if (!userDoc.exists()) {

        throw new Error(
          "User profile not found. Please contact admin."
        );

      }

      const userData = userDoc.data();

      // SAVE LOGIN FOR BIOMETRIC QUICK ACCESS
      localStorage.setItem(
        "mentora_saved_email",
        email
      );

      localStorage.setItem(
        "mentora_saved_password",
        password
      );

      localStorage.setItem(
        "mentora_biometric_enabled",
        "true"
      );

      if (userData.role === "admin") {

        window.location.href = "admin.html";

      } else {

        window.location.href = "dashboard.html";

      }

    } catch (err) {

      loginBtn.disabled = false;

      btnText.textContent = "Login";

      spinner.classList.add("hidden");

      errorMsg.textContent =
        err.code === "auth/wrong-password"
          ? "Incorrect password. Please try again."
          : err.code === "auth/user-not-found"
          ? "No account found with this email."
          : err.message;

      errorMsg.classList.remove("hidden");

    }

  });

  // ================= FORGOT PASSWORD =================

  forgotBtn.addEventListener("click", async () => {

    const email =
      document.getElementById("email").value.trim();

    if (!email) {

      errorMsg.textContent =
        "Please enter your registered email first.";

      errorMsg.classList.remove("hidden");

      return;

    }

    try {

      await sendPasswordResetEmail(auth, email);

      errorMsg.className =
        "mt-5 text-sm text-green-700 bg-green-50 border border-green-200 rounded-xl px-4 py-3 text-center";

      errorMsg.textContent =
        "Password reset link sent. Please check your email.";

      errorMsg.classList.remove("hidden");

    } catch (err) {

      errorMsg.textContent = err.message;

      errorMsg.classList.remove("hidden");

    }

  });

  // ================= BIOMETRIC LOGIN =================

  biometricBtn.addEventListener("click", async () => {

    try {

      // CHECK SUPPORT
      if (
        !window.PublicKeyCredential ||
        !navigator.credentials
      ) {

        alert(
          "Biometric login is not supported on this device."
        );

        return;

      }

      // CHECK SAVED LOGIN
      const savedEmail =
        localStorage.getItem("mentora_saved_email");

      const savedPassword =
        localStorage.getItem("mentora_saved_password");

      if (!savedEmail || !savedPassword) {

        alert(
          "Please login normally once before using biometrics."
        );

        return;

      }

      // DEVICE AUTH
      const available =
        await PublicKeyCredential
          .isUserVerifyingPlatformAuthenticatorAvailable();

      if (!available) {

        alert(
          "No fingerprint or biometric authentication available on this device."
        );

        return;

      }

      // SIMPLE BIOMETRIC PROMPT
      const challenge = new Uint8Array(32);

      crypto.getRandomValues(challenge);

      try {

        await navigator.credentials.get({
          publicKey: {
            challenge,
            timeout: 60000,
            userVerification: "required",
            allowCredentials: []
          }
        });

      } catch {

        // FALLBACK FOR DEVICES WITHOUT PASSKEYS
        const useFallback = confirm(
          "Passkeys are not configured on this device.\n\nUse device confirmation login instead?"
        );

        if (!useFallback) return;

      }

      // AUTO LOGIN
      biometricBtn.innerHTML =
        "🔓 Verifying Biometrics...";

      const userCredential =
        await signInWithEmailAndPassword(
          auth,
          savedEmail,
          savedPassword
        );

      const user = userCredential.user;

      const userDoc =
        await getDoc(doc(db, "users", user.uid));

      const userData = userDoc.data();

      biometricBtn.innerHTML =
        "✅ Access Granted";

      setTimeout(() => {

        if (userData.role === "admin") {

          window.location.href = "admin.html";

        } else {

          window.location.href = "dashboard.html";

        }

      }, 1000);

    } catch (err) {

      console.log(err);

      biometricBtn.innerHTML =
        "🔐 Login with Biometrics";

      errorMsg.textContent =
        "Biometric login failed. Please try normal login.";

      errorMsg.classList.remove("hidden");

    }

  });

</script>

<!-- ================= STYLES ================= -->
<style>

html {
  scroll-behavior: smooth;
}

* {
  transition:
    background-color 0.4s ease,
    color 0.4s ease,
    border-color 0.4s ease,
    box-shadow 0.4s ease;
}

.input {
  width: 100%;
  padding: 0.9rem 1rem;
  border-radius: 0.9rem;
  border: 1px solid #E5E7EB;
  background: rgba(255,255,255,0.7);
  color: #111827;
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

.dark .input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
}

.input::placeholder {
  color: #9CA3AF;
}

.dark .input::placeholder {
  color: #94A3B8;
}

.input:focus {
  outline: none;
  border-color: #22C55E;
  box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
}

.glow-hover:hover {
  box-shadow: 0 0 25px rgba(34,197,94,0.35);
}

@keyframes fadeIn {

  from {
    opacity: 0;
    transform: translateY(15px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }

}

.animate-fadeIn {
  animation: fadeIn 0.7s ease;
}

@keyframes scaleIn {

  from {
    opacity: 0;
    transform: scale(0.95);
  }

  to {
    opacity: 1;
    transform: scale(1);
  }

}

.animate-scaleIn {
  animation: scaleIn 0.3s ease;
}

</style>

  </div>

</footer>

</body>
</html>
