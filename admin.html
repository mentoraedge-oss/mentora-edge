<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0F2A44">
<link rel="apple-touch-icon" href="/icons/ios/180.png">
<link rel="stylesheet" href="css/theme.css">
<title>Admin Panel | Mentora Edge</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  darkMode: 'class', // ⭐ THIS IS THE IMPORTANT LINE

  theme: {
    extend: {
      fontFamily: { inter: ['Inter', 'sans-serif'] },

      colors: {
        primary: '#0F2A44',
        accent: '#22C55E',
        accentSoft: '#4ADE80'
      }
    }
  }
}
</script>
</head>

<body class="bg-[#F8FAFC] font-inter text-gray-800 overflow-x-hidden">

<!-- BACKGROUND GLOW -->
<div class="fixed w-96 h-96 bg-green-400/20 blur-3xl rounded-full top-[-80px] left-[-80px]"></div>
<div class="fixed w-96 h-96 bg-blue-500/20 blur-3xl rounded-full bottom-[-80px] right-[-80px]"></div>

<!-- ================= NAVBAR ================= -->
<header class="bg-white/80 backdrop-blur-xl shadow-sm sticky top-0 z-40 border-b">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <h1 class="text-xl font-extrabold text-primary tracking-tight">
      Mentora Edge Admin
    </h1>

    <button id="logoutBtn"
      class="px-4 py-2 rounded-lg bg-red-50 text-red-600 font-semibold
             hover:bg-red-100 transition">
      Logout
    </button>

  </div>
</header>

<!-- ================= MAIN ================= -->
<main class="max-w-7xl mx-auto px-6 py-10 space-y-12 relative z-10">

<!-- ANNOUNCEMENT -->
<section class="glass-card">
  <h2 class="section-title">📢 Global Announcement</h2>

  <textarea id="announcementText"
    class="input mt-3"
    rows="4"
    placeholder="Write announcement..."></textarea>

  <div class="text-right mt-4">
    <button id="publishAnnouncementBtn" class="btn-primary">
      Publish
    </button>
  </div>
</section>

<!-- MATERIAL UPLOAD -->
<section class="glass-card">
  <h2 class="section-title">📚 Upload Study Material</h2>

  <div class="grid md:grid-cols-4 gap-4 mt-4">

    <select id="materialClass" class="input">
      <option value="">Class</option>
      <option value="VIII">VIII</option>
      <option value="IX">IX</option>
      <option value="X">X</option>
    </select>

    <input id="materialTitle" class="input" placeholder="Title">

    <input id="materialFile" type="file" class="input-file">

    <button id="uploadMaterialBtn" class="btn-primary">
      Upload
    </button>

  </div>
</section>

<!-- STUDENTS -->
<section class="glass-card overflow-hidden">
  <h2 class="section-title">👥 Student Approvals</h2>

  <div class="overflow-x-auto mt-4">
    <table class="w-full text-sm">
      <thead class="bg-white/50 backdrop-blur">
        <tr>
          <th class="px-6 py-3 text-left">Name</th>
          <th>Email</th>
          <th>Class</th>
          <th>Status</th>
          <th>Student ID</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="studentsTable" class="divide-y"></tbody>
    </table>
  </div>
</section>

<!-- FEES -->
<section class="glass-card">
  <h2 class="section-title">💰 Monthly Fees Management</h2>

  <div class="flex gap-4 mt-4">
    <select id="feeStudent" class="input"></select>

    <button id="showFeesBtn" class="btn-primary">
      Show Fee Status
    </button>
  </div>

  <div id="feesGrid" class="grid md:grid-cols-3 gap-4 mt-6"></div>
</section>

</main>

<!-- ================= SCRIPT (UNCHANGED LOGIC) ================= -->
<script type="module">
import { auth, db } from "./js/firebase.js";
import { onAuthStateChanged, signOut } from
  "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  collection, getDocs, doc, getDoc,
  addDoc, updateDoc, deleteDoc, setDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const storage = getStorage();
const studentsTable = document.getElementById("studentsTable");
const feeStudent = document.getElementById("feeStudent");
const feesGrid = document.getElementById("feesGrid");

const months = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "login.html";
  const snap = await getDoc(doc(db,"users",user.uid));
  if (snap.data().role !== "admin") return location.href="login.html";

  loadStudents();
  loadFeeStudents();
});

async function getNextStudentId() {
  const snap = await getDocs(collection(db, "users"));
  let max = 0;

  snap.forEach(d => {
    const id = d.data().studentId;
    if (id && id.startsWith("ME")) {
      const num = parseInt(id.replace("ME",""));
      if (num > max) max = num;
    }
  });

  return "ME" + String(max + 1).padStart(4,"0");
}

async function loadStudents(){
  studentsTable.innerHTML="";
  const snap = await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const u = d.data();
    if(u.role !== "student") return;

    studentsTable.innerHTML += `
      <tr class="hover:bg-gray-50 transition">
        <td class="px-6 py-3 font-medium">${u.name}</td>
        <td>${u.email}</td>
        <td>${u.class}</td>
        <td class="${u.status==="active"?"text-green-600":"text-orange-500"}">${u.status}</td>
        <td class="font-mono">${u.studentId || "-"}</td>
        <td class="space-x-3">
          ${
            u.status === "pending"
            ? `
              <button onclick="approve('${d.id}')" class="text-green-600 hover:underline">Approve</button>
              <button onclick="rejectStudent('${d.id}')" class="text-red-600 hover:underline">Reject</button>
            `
            : `
              ${!u.studentId
                ? `<button onclick="generateId('${d.id}')" class="text-blue-600 hover:underline">Generate ID</button>`
                : ""
              }
              <button onclick="removeStudent('${d.id}')" class="text-red-600 hover:underline">Remove</button>
            `
          }
        </td>
      </tr>`;
  });
}

/* (ALL YOUR LOGIC BELOW IS EXACT SAME — NO CHANGE) */
window.generateId = async (uid) => {
  const userRef = doc(db,"users",uid);
  const snap = await getDoc(userRef);
  const u = snap.data();

  const studentId = await getNextStudentId();

  await updateDoc(userRef,{ studentId });

  await setDoc(doc(db,"studentVerifications", studentId), {
    studentId,
    name: u.name,
    class: u.class,
    fatherName: u.fatherName || "",
    motherName: u.motherName || "",
    verifiedAt: serverTimestamp()
  });

  alert("Student ID generated: " + studentId);
  loadStudents();
};

window.approve = async (id) => {
  await updateDoc(doc(db,"users",id), { status:"active" });
  loadStudents();
};

window.rejectStudent = async (id) => {
  if(!confirm("Reject student permanently?")) return;
  await deleteDoc(doc(db,"users",id));
  loadStudents();
};

window.removeStudent = async (id) => {
  if(!confirm("Remove student permanently?")) return;
  await deleteDoc(doc(db,"users",id));
  loadStudents();
};

async function loadFeeStudents(){
  feeStudent.innerHTML="<option value=''>Select Student</option>";
  const snap=await getDocs(collection(db,"users"));
  snap.forEach(d=>{
    if(d.data().role==="student"){
      feeStudent.innerHTML+=`<option value="${d.id}">${d.data().name}</option>`;
    }
  });
}

showFeesBtn.onclick = async () => {
  if(!feeStudent.value) return alert("Select a student");
  feesGrid.innerHTML="";

  const snap = await getDoc(doc(db,"users",feeStudent.value));
  const fees = snap.data().fees?.["2026"] || {};

  months.forEach(m=>{
    const paid = fees[m]?.paid === true;
    feesGrid.innerHTML += `
      <div class="fee-card">
        <div>
          <p class="font-semibold">${m}</p>
          <p class="${paid?"text-green-600":"text-red-500"} text-sm">
            ${paid?"Paid":"Not Paid"}
          </p>
        </div>
        ${paid ? "✔️" : `<button onclick="markPaid('${m}')" class="text-accent text-sm">Mark Paid</button>`}
      </div>`;
  });
};

window.markPaid = async (month)=>{
  const refUser = doc(db,"users",feeStudent.value);
  const snap = await getDoc(refUser);
  const fees = snap.data().fees || {};
  fees["2026"] = fees["2026"] || {};
  fees["2026"][month] = { paid:true, paidOn:serverTimestamp() };
  await updateDoc(refUser,{ fees });
  showFeesBtn.click();
};

publishAnnouncementBtn.onclick = async () => {
  if(!announcementText.value.trim()) return alert("Empty announcement");
  await addDoc(collection(db,"announcements"),{
    text:announcementText.value,
    createdAt:serverTimestamp()
  });
  announcementText.value="";
  alert("Announcement published");
};

uploadMaterialBtn.onclick = async () => {
  if(!materialClass.value || !materialTitle.value || !materialFile.files[0]){
    alert("Fill all fields"); return;
  }
  uploadMaterialBtn.disabled=true;
  const file = materialFile.files[0];
  const storageRef = ref(storage, `materials/${Date.now()}_${file.name}`);
  await uploadBytes(storageRef,file);
  const url = await getDownloadURL(storageRef);
  await addDoc(collection(db,"materials"),{
    title: materialTitle.value,
    class: materialClass.value,
    fileURL: url,
    createdAt: serverTimestamp()
  });
  uploadMaterialBtn.disabled=false;
  materialClass.value=""; materialTitle.value=""; materialFile.value="";
  alert("Material uploaded");
};

logoutBtn.onclick = async()=>{
  await signOut(auth);
  location.href="login.html";
};
</script>

<!-- ================= STYLES ================= -->
<style>

}

  transform: translateY(-5px);

</style>
<script>
const savedTheme = localStorage.getItem("theme");

if (savedTheme) {
  document.documentElement.classList.toggle("dark", savedTheme === "dark");
} else {
  // Auto detect system theme
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add("dark");
  }
}
</script>
</body>
</html>
